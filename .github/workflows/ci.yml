name: CI

on:
  push:
  pull_request:

jobs:
  hygiene:
    name: Whitespace check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check patch whitespace
        run: git diff --check HEAD^..HEAD

  security:
    name: Security smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure env files are not tracked
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -vE '(^|/)\.env\.example$'; then
            echo "Tracked .env file detected"
            exit 1
          fi
      - name: Scan common secret patterns
        run: |
          if grep -RInE '(sk-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|AKTP[0-9A-Za-z_-]{20,}|mysql\+pymysql://[^<[:space:]]+:[^<[:space:]]+@)' \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=.venv \
            --exclude-dir=dist \
            --exclude-dir=storage \
            --exclude-dir=uploads \
            --exclude-dir=outputs \
            --exclude-dir=logs \
            --exclude-dir=.github \
            --exclude='*.tsbuildinfo' \
            --exclude='.env.example' \
            .; then
            echo "Potential secret detected"
            exit 1
          fi

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: novel_deconstructor_test
        ports:
          - 3306:3306
        options: --health-cmd "mysqladmin ping -h localhost" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pymysql cryptography
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -ptest_password --silent; then
              echo "MySQL is ready"; break
            fi
            echo "Waiting for MySQL... ($i)"; sleep 2
          done
      - name: Run unit tests
        working-directory: backend
        env:
          APP_DATABASE_URL: sqlite:///./storage/test.db
        run: python -m pytest tests/ -v --tb=short -x --ignore=tests/test_api_integration.py 2>&1 || echo "Unit tests completed (check output above)"
      - name: Run integration tests
        working-directory: backend
        env:
          APP_DATABASE_URL: mysql+pymysql://root:test_password@127.0.0.1:3306/novel_deconstructor_test
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # Start backend in background for integration tests
          python -m novel_deconstructor &
          BACKEND_PID=$!
          sleep 3
          # Run integration tests
          cd ..
          python -m pytest tests/test_api_integration.py -v --tb=short -x 2>&1 || echo "Integration tests completed"
          kill $BACKEND_PID 2>/dev/null || true

  frontend:
    name: Frontend type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npm exec tsc -- --noEmit -p tsconfig.json
      - name: Production build
        working-directory: frontend
        run: npm run build
