services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/backend/storage
      - ./uploads:/app/backend/uploads
      - ./outputs:/app/backend/outputs
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    ports:
      - "5173:80"
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./storage/qdrant:/qdrant/storage
