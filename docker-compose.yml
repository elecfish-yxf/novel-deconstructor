services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/backend/storage
      - ./uploads:/app/backend/uploads
      - ./outputs:/app/backend/outputs

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    ports:
      - "5173:80"
    depends_on:
      - backend
